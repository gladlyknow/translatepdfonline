<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle fill="#334155" cx="1" cy="1" r="0.8" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Top bar -->
  <rect width="800" height="52" fill="#0F172A" />
  <line x1="0" y1="52" x2="800" y2="52" stroke="#334155" stroke-width="1" />
  <circle cx="18" cy="26" r="6" fill="#EF4444" />
  <circle cx="34" cy="26" r="6" fill="#F59E0B" />
  <circle cx="50" cy="26" r="6" fill="#10B981" />
  <rect x="200" y="16" width="400" height="24" rx="6" fill="#1E293B" stroke="#334155" />
  <text x="400" y="33" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="monospace">~/design-system/components</text>
  <text x="730" y="33" text-anchor="middle" fill="#38BDF8" font-size="12" font-weight="bold">● 实时预览</text>

  <!-- Left sidebar -->
  <rect width="64" y="52" height="448" fill="#0F172A" />
  <line x1="64" y1="52" x2="64" y2="500" stroke="#334155" />
  <text x="32" y="100" text-anchor="middle" fill="#38BDF8" font-size="22">📄</text>
  <text x="32" y="140" text-anchor="middle" fill="#475569" font-size="22">🎨</text>
  <text x="32" y="180" text-anchor="middle" fill="#475569" font-size="22">⚙️</text>
  <text x="32" y="220" text-anchor="middle" fill="#475569" font-size="22">📊</text>

  <!-- Main content area -->
  <g transform="translate(84, 68)">
    <text x="0" y="24" fill="#F8FAFC" font-size="20" font-weight="bold">设计系统 — 组件库</text>
    
    <!-- Hero image placeholder -->
    <rect x="0" y="44" width="180" height="120" rx="12" fill="#1E293B" stroke="#334155" filter="url(#cardShadow)" />
    <text x="90" y="98" text-anchor="middle" fill="#38BDF8" font-size="42">🖼️</text>
    <text x="90" y="144" text-anchor="middle" fill="#64748B" font-size="11">主视觉占位</text>

    <!-- Description text with emojis (translated to Chinese) -->
    <text x="200" y="66" fill="#CBD5E0" font-size="13" font-family="sans-serif">
      <tspan x="200" dy="0">原子设计 + 现代主题。🚀</tspan>
      <tspan x="200" dy="24">使用可复用构件构建可扩展界面，</tspan>
      <tspan x="200" dy="24">完美适配跨平台产品。✨</tspan>
      <tspan x="200" dy="24">可维护、高性能、无障碍。♿</tspan>
    </text>

    <!-- Metrics table -->
    <text x="0" y="204" fill="#F8FAFC" font-size="16" font-weight="bold">📋 核心指标</text>
    <rect x="0" y="220" width="320" height="140" rx="10" fill="#111827" stroke="#1E293B" filter="url(#cardShadow)" />
    <path d="M 0 230 Q 0 220 8 220 L 312 220 Q 320 220 320 230 L 320 250 L 0 250 Z" fill="#1E293B" />
    <line x1="160" y1="220" x2="160" y2="360" stroke="#1E293B" />
    <text x="80" y="239" text-anchor="middle" fill="#38BDF8" font-size="12" font-weight="bold">组件</text>
    <text x="240" y="239" text-anchor="middle" fill="#38BDF8" font-size="12" font-weight="bold">使用次数</text>
    <line x1="0" y1="250" x2="320" y2="250" stroke="#1E293B" />
    <text x="80" y="272" text-anchor="middle" fill="#94A3B8" font-size="13">按钮</text>
    <text x="240" y="272" text-anchor="middle" fill="#94A3B8" font-size="13">124</text>
    <line x1="0" y1="286" x2="320" y2="286" stroke="#1E293B" />
    <text x="80" y="308" text-anchor="middle" fill="#94A3B8" font-size="13">输入框</text>
    <text x="240" y="308" text-anchor="middle" fill="#94A3B8" font-size="13">89</text>
    <line x1="0" y1="322" x2="320" y2="322" stroke="#1E293B" />
    <text x="80" y="344" text-anchor="middle" fill="#94A3B8" font-size="13">卡片</text>
    <text x="240" y="344" text-anchor="middle" fill="#94A3B8" font-size="13">45</text>

    <!-- Code snippet -->
    <text x="350" y="204" fill="#F8FAFC" font-size="16" font-weight="bold">💻 按钮组件代码</text>
    <rect x="350" y="220" width="330" height="140" rx="10" fill="#0B1121" stroke="#1E293B" filter="url(#cardShadow)" />
    <text x="365" y="240" fill="#38BDF8" font-family="monospace" font-size="11">export const Button = ({</text>
    <text x="375" y="255" fill="#A5F3FC" font-family="monospace" font-size="11">  variant, size, children</text>
    <text x="365" y="270" fill="#38BDF8" font-family="monospace" font-size="11">}) => {</text>
    <text x="375" y="285" fill="#F472B6" font-family="monospace" font-size="11">  return (</text>
    <text x="385" y="300" fill="#F8FAFC" font-family="monospace" font-size="11">    &lt;button className={`btn-${variant}`}&gt;</text>
    <text x="395" y="315" fill="#F8FAFC" font-family="monospace" font-size="11">      {children}</text>
    <text x="385" y="330" fill="#F8FAFC" font-family="monospace" font-size="11">    &lt;/button&gt;</text>
    <text x="375" y="345" fill="#F472B6" font-family="monospace" font-size="11">  );</text>
    <text x="365" y="360" fill="#38BDF8" font-family="monospace" font-size="11">};</text>

    <!-- Math formula -->
    <text x="0" y="396" fill="#A5F3FC" font-size="13" font-family="monospace">📐 欧拉恒等式：e^(iπ) + 1 = 0</text>

    <!-- Footer -->
    <rect x="0" y="416" width="680" height="28" rx="6" fill="#0F172A" />
    <line x1="0" y1="416" x2="680" y2="416" stroke="#1E293B" />
    <text x="12" y="435" fill="#64748B" font-size="11">上次构建：2 分钟前</text>
    <text x="340" y="435" text-anchor="middle" fill="#64748B" font-size="11">v3.2.1</text>
    <text x="668" y="435" text-anchor="end" fill="#64748B" font-size="11">MIT 许可证</text>
  </g>
</svg>