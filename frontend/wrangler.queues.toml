# OCR queue consumer worker for translatepdfonline
name = "translatepdfonline-quenues"
main = "worker-queue.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
keep_names = false

[observability]
enabled = true

[vars]
# 独立队列 worker 仅负责触发主应用 OCR dispatch 接口。
# 建议设置：
# OCR_DISPATCH_URL=https://<main-worker-domain>/api/ocr/dispatch-pending
# OCR_DISPATCH_SECRET=<same as main worker CRON_SECRET>

[triggers]
crons = ["*/2 * * * *"]


[[queues.consumers]]
queue = "translatepdfonline"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 5