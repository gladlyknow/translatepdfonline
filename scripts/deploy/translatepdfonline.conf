# Nginx：后端 API 生产环境（www.backend.translatepdfonline.com），HTTPS 443 + 反代到 FastAPI
# 前端：www.translatepdfonline.com → Cloudflare Pages（不在本机）
# 部署：cp scripts/deploy/translatepdfonline.conf /etc/nginx/conf.d/ && nginx -t && systemctl reload nginx
# SSL：为 www.backend.translatepdfonline.com 配置证书（如 /data/config/backend-translatepdfonline.pem）
# 后端路由：/health、/api/*

# 80 跳转 443
server {
    listen 80;
    server_name www.backend.translatepdfonline.com backend.translatepdfonline.com;
    return 301 https://www.backend.translatepdfonline.com$request_uri;
}

# 443 API：反代到后端 (127.0.0.1:8000)
server {
    listen 443 ssl http2;
    server_name www.backend.translatepdfonline.com backend.translatepdfonline.com;

    ssl_certificate     /data/config/backend-translatepdfonline.pem;
    ssl_certificate_key /data/config/backend-translatepdfonline.key;
    ssl_session_timeout  1d;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 100M;

    # 统一反代到 FastAPI：/health、/api、/api/docs、/api/openapi.json 等均由后端路由
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
