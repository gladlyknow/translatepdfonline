# Nginx 配置：API 反向代理 + HTTPS
# 部署：cp scripts/deploy/translatepdfonline.conf /etc/nginx/conf.d/ && nginx -t && systemctl reload nginx
# SSL 证书路径：/data/config/translatepdfonline.pem、translatepdfonline.key（需事先放在服务器上）
server {
    listen 80;
    listen 443 ssl;
    server_name translatepdfonline.com;
    client_max_body_size 100M;

    ssl_certificate     /data/config/translatepdfonline.pem;
    ssl_certificate_key  /data/config/translatepdfonline.key;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
    }
}
